services:
  - type: web
    name: ielts-speaking-coach
    runtime: docker
    plan: free
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_PATH
        value: /tmp/ielts.db
      - key: LLM_PROVIDER
        value: deepseek
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: DEEPSEEK_API_KEY
        sync: false
